syntax = "proto3";
package bpln_proto.commander.service.v2;

import "bpln_proto/commander/service/v2/common.proto";

message QueryRunRequest {
  JobRequestCommon job_request_common = 1;

  optional string ref = 2;
  string sql_query = 3;
  string cache = 4;

  optional string namespace = 5;
}

message QueryRunResponse {
  // Everything needed to fetch the artifact.
  message QueryResultArtifact {
    // The artifact ID to request (GET /artifacts/{artifact_id}).
    string artifact_id = 1;

    // The runner's iroh public key, used to establish an h3 connection.
    bytes server_public_key = 2;

    // A signed JWT authorizing access to a specific artifact. Passed as a
    // Bearer token in the Authorization header of the h3 request.
    string auth_token = 3;
  }

  JobResponseCommon job_response_common = 1;

  string sql_query = 2;

  string ref = 3;
  string namespace = 4;

  string cache = 5;

  reserved 6;

  // Where and how to fetch the result artifact.
  QueryResultArtifact result_artifact = 7;
}
