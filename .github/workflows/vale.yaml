name: Vale

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/vale.yaml
      - .vale.ini
      - styles/**
      - docs/pages/*.md
      - docs/pages/*.mdx
      - examples/**/*.md

permissions:
  contents: read

concurrency:
  group: vale-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  vale:
    name: Vale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # vale-action runs vale with a stripped environment (only PATH), which
      # breaks mise shims. Add the real binary paths so mdx2vast resolves
      # without going through a shim.
      - run: mise bin-paths >> "$GITHUB_PATH"

      - uses: errata-ai/vale-action@d89dee975228ae261d22c15adcd03578634d429c # v2.1.1
        with:
          files: '["docs/pages", "examples"]'
