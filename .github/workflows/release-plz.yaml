name: Release-plz

on:
  push:
    branches: [main]

permissions: {}

jobs:
  # Tag and create a GitHub release for unpublished versions.
  release-plz-release:
    name: Release-plz release
    runs-on: blacksmith-16vcpu-ubuntu-2404
    if: ${{ github.repository_owner == 'BauplanLabs' }}
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.release-plz.outputs.releases_created == 'true' && fromJSON(steps.release-plz.outputs.releases)[0].tag || '' }}
    permissions:
      contents: write # Create GitHub releases
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: release-plz release
        id: release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build wheels and a tarball with the CLI, and publish them to PyPI and the
  # GitHub release respectively.
  publish:
    name: Publish release artifacts
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.releases_created == 'true' }}
    permissions:
      contents: write # Upload tarballs to GitHub release
      id-token: write # Trusted publishing to PyPI
    uses: ./.github/workflows/publish.yaml
    with:
      tag: ${{ needs.release-plz-release.outputs.tag }}

  # Deploy docs for the new version.
  docs:
    name: Deploy docs
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.releases_created == 'true' }}
    permissions:
      id-token: write # AWS OIDC authentication
      contents: write # Deploy docs
      pull-requests: write # Update PR with deploy status
    uses: ./.github/workflows/docs.yaml
    with:
      environment: prod

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: blacksmith-16vcpu-ubuntu-2404
    if: ${{ github.repository_owner == 'BauplanLabs' }}
    permissions:
      contents: write # Push changelog commits
      pull-requests: write # Create release PRs
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: release-plz PR
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
