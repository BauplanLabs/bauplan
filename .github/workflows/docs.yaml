name: Docs Website

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/docs.yaml
      - docs/**
      - "!**/README.md"
      - "!**/Justfile"
  push:
    branches:
      - main
    paths:
      - .github/workflows/docs.yaml
      - docs/**
      - "!**/README.md"
      - "!**/Justfile"
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev or prod)"
        type: string
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev or prod)"
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  contents: read

concurrency:
  group: docs-deploy-${{ inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    permissions:
      id-token: write # Required for AWS OIDC authentication
    runs-on: blacksmith-16vcpu-ubuntu-2404
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          working_directory: ./docs

      - uses: ./.github/actions/setup-caches
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: docs/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-

      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          role-session-name: DeployDocsWebsite
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: false

      - name: docusaurus build
        working-directory: ./docs
        env:
          DOCS_URL: ${{ vars.DOCS_URL }}
        run: just build /tmp/build

      # Run typechecking after building, so that it also checks the generated mdx files.
      - name: Typecheck doc snippets
        run: cargo test --test snippets -- docs_website

      # By default, we have a strict robots.txt, so that the dev/qa sites
      # (which are public) don't get scraped. In prod, we need to delete
      # that file.
      - if: inputs.environment == 'prod'
        run: rm /tmp/build/robots.txt

      - name: aws s3 sync
        run: aws s3 sync /tmp/build s3://${DOCS_S3_BUCKET} --delete
        env:
          DOCS_S3_BUCKET: ${{ vars.DOCS_S3_BUCKET }}
      - name: invalidate cloudfront
        run: aws cloudfront create-invalidation --distribution-id "${DOCS_CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*" --output text --query "Invalidation.Id"
        env:
          DOCS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.DOCS_CLOUDFRONT_DISTRIBUTION_ID }}
