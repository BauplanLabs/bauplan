[workspace]
git_only = true
publish = false

[[package]]
name = "bauplan"
release = true
changelog_update = true
changelog_path = "./CHANGELOG.md"
git_tag_enable = true
git_release_enable = true
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

[[package]]
name = "bauplan-longbow"
release = false
changelog_update = false
git_tag_enable = false
git_release_enable = false
# This seems to be the only way to get `release-plz release-pr` to ignore
# bauplan-longbow (it should be ignored because of release = false).
# This works because it thinks it's the initial release of bauplan-longbow each
# time.
# https://github.com/release-plz/release-plz/issues/2595
git_tag_name = "_nonexistent"

[changelog]
trim = true
header = ""
body = """
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}[{{ commit.scope }}] {% endif %}{{ commit.message | upper_first }} ({{ commit.id }})
{%- endfor %}
{% endfor %}
"""
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->New Features" },
  { message = "^fix", group = "<!-- 1 -->Bugfixes" },
  { message = "^doc", skip = true },
  { message = "^perf", skip = true },
  { message = "^refactor", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^chore|^ci", skip = true },
  { message = "build", skip = true },
  { message = "^revert", skip = true },
]
